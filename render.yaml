# Render Blueprint — deploys the FastAPI app together with a managed
# PostgreSQL database and a managed Redis (Key Value) instance.
#
# This is the Render equivalent of your docker-compose.yaml:
#   - the "web" service is built from your Dockerfile
#   - the "db" container is replaced by Render's managed Postgres
#   - the "redis" container is replaced by Render's managed Key Value store


databases:
  - name: contacts-db
    databaseName: contacts
    user: contacts
    plan: free
    region: frankfurt

services:
  - type: redis
    name: contacts-redis
    plan: free
    region: frankfurt
    ipAllowList: []

  - type: web
    name: contacts-api
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/healthchecker
    dockerCommand: sh start.sh
    envVars:
      - key: DB_URL
        fromDatabase:
          name: contacts-db
          property: connectionString

      - key: REDIS_HOST
        fromService:
          name: contacts-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: contacts-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        value: ""
      - key: REDIS_CACHE_TTL
        value: "900"

      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: JWT_RESET_TOKEN_EXPIRE_MINUTES
        value: "60"

      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_SERVER
        sync: false

      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false