<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset your password</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --error: #f87171;
            --success: #34d399;
            --border: #334155;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                Helvetica, Arial, sans-serif;
            padding: 1rem;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        h1 { font-size: 1.4rem; margin: 0 0 0.5rem; }
        p.subtitle { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.95rem; }
        label { display: block; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--muted); }
        .field { margin-bottom: 1.1rem; }
        input[type="password"] {
            width: 100%;
            padding: 0.7rem 0.85rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0b1220;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.15s ease;
        }
        input[type="password"]:focus { border-color: var(--accent); }
        button {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        button:hover:not(:disabled) { background: var(--accent-hover); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            margin-top: 1rem;
            padding: 0.75rem 0.9rem;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
        }
        .message.error { display: block; background: rgba(248, 113, 113, 0.12); color: var(--error); }
        .message.success { display: block; background: rgba(52, 211, 153, 0.12); color: var(--success); }
        .hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Reset your password</h1>
        {% if invalid_token %}
            <p class="subtitle">This password reset link is invalid or has expired.</p>
            <div class="message error" style="display:block">
                Please request a new password reset link and try again.
            </div>
        {% else %}
            <p class="subtitle">Choose a new password for your account.</p>
            <form id="reset-form" novalidate>
                <div class="field">
                    <label for="new_password">New password</label>
                    <input type="password" id="new_password" name="new_password"
                           minlength="6" maxlength="128" required autocomplete="new-password">
                    <div class="hint">At least 6 characters.</div>
                </div>
                <div class="field">
                    <label for="confirm_password">Confirm new password</label>
                    <input type="password" id="confirm_password" name="confirm_password"
                           minlength="6" maxlength="128" required autocomplete="new-password">
                </div>
                <button type="submit" id="submit-btn">Update password</button>
            </form>
            <div class="message" id="message"></div>
        {% endif %}
    </div>

    {% if not invalid_token %}
    <script>
        const form = document.getElementById("reset-form");
        const messageBox = document.getElementById("message");
        const submitBtn = document.getElementById("submit-btn");
        // The POST endpoint shares this page's URL, so we submit to it directly.
        const endpoint = window.location.pathname;

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = "message " + type;
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const newPassword = document.getElementById("new_password").value;
            const confirmPassword = document.getElementById("confirm_password").value;

            if (newPassword.length < 6) {
                showMessage("Password must be at least 6 characters.", "error");
                return;
            }
            if (newPassword !== confirmPassword) {
                showMessage("Passwords do not match.", "error");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Updating...";

            try {
                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ new_password: newPassword }),
                });
                const data = await response.json().catch(() => ({}));

                if (response.ok) {
                    form.style.display = "none";
                    showMessage(
                        data.message || "Your password has been reset successfully.",
                        "success"
                    );
                } else {
                    showMessage(
                        data.detail || "Could not reset password. The link may have expired.",
                        "error"
                    );
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Update password";
                }
            } catch (err) {
                showMessage("Network error. Please try again.", "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "Update password";
            }
        });
    </script>
    {% endif %}
</body>
</html>
